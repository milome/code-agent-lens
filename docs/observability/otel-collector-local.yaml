receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4318
      grpc:
        endpoint: 127.0.0.1:4317

processors:
  batch: {}

exporters:
  debug:
    verbosity: detailed
  otlp/tempo:
    endpoint: 127.0.0.1:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]

# Grafana Tempo Trace correlation:
# - Use traceID and spanID from spans to correlate the Jaeger/Grafana trace with CodeAgentLens local dump files.
# - Add a trace-to-logs/detail link that points at CODE_AGENT_LENS_OBS_VIEWER_PUBLIC_URL, for example:
#   http://127.0.0.1:3011/debug/obs/trace/${__span.traceId}
# - Keep full prompts and bodies in local dump files only; use code-agent-lens_obs_ref as the safe trace attribute.

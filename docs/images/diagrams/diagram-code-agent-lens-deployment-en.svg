  <rect x="500" y="470" width="140" height="50" rx="12" class="box" fill="#fafaf9" stroke="#7c3aed"/>
  <text x="570" y="501" class="font node-title" text-anchor="middle" fill="#6b21a8"><tspan x="570" dy="0">Dump Root</tspan></text>

  <rect x="705" y="170" width="300" height="355" rx="18" class="box" fill="#fafaf9" stroke="#ea580c"/>
  <text x="727" y="207" class="font group-title" text-anchor="start" fill="#ea580c">Observability Stack</text>
  <rect x="745" y="220" width="220" height="78" rx="12" class="box" fill="#fafaf9" stroke="#ea580c"/>
  <text x="855" y="252" class="font node-title" text-anchor="middle" fill="#92400e"><tspan x="855" dy="0">OTel Collector</tspan></text>
  <text x="855" y="275" class="font node-subtitle" text-anchor="middle">4317 / 4318 / 8888</text>
  <rect x="745" y="360" width="220" height="78" rx="12" class="box" fill="#fafaf9" stroke="#ea580c"/>
  <text x="855" y="392" class="font node-title" text-anchor="middle" fill="#92400e"><tspan x="855" dy="0">Jaeger / Grafana</tspan></text>
  <text x="855" y="415" class="font node-subtitle" text-anchor="middle">16686 / 13000</text>
  <rect x="745" y="470" width="220" height="76" rx="12" class="box" fill="#fafaf9" stroke="#ea580c"/>
  <text x="855" y="502" class="font node-title" text-anchor="middle" fill="#92400e"><tspan x="855" dy="0">Prometheus / Tempo</tspan></text>
  <text x="855" y="525" class="font node-subtitle" text-anchor="middle">9090 / 3200</text>

  <line x1="205" y1="261" x2="330" y2="261" class="line" stroke="#8b5a2b" marker-end="url(#arrow-client)"/>
  <line x1="205" y1="401" x2="330" y2="401" class="line" stroke="#8b5a2b" marker-end="url(#arrow-client)"/>
  <path d="M 510 245 H 675 V 93 H 875" class="line dash" stroke="#dc2626" marker-end="url(#arrow-external)"/>
  <line x1="510" y1="270" x2="745" y2="270" class="line" stroke="#ea580c" marker-end="url(#arrow-telemetry)"/>
  <path d="M 365 290 V 322 H 300 V 495 H 330" class="line" stroke="#16a34a" marker-end="url(#arrow-local)"/>
  <path d="M 475 290 V 328 H 570 V 470" class="line dash" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <path d="M 510 405 H 610 V 470" class="line dash" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <line x1="510" y1="395" x2="745" y2="395" class="line dash" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <path d="M 965 259 H 985 V 399 H 965" class="line" stroke="#ea580c" marker-end="url(#arrow-telemetry)"/>
  <path d="M 965 399 H 985 V 505 H 965" class="line" stroke="#ea580c" marker-end="url(#arrow-telemetry)"/>

  <line x1="92" y1="624" x2="120" y2="624" stroke="#8b5a2b" stroke-width="2.5"/>
  <text x="130" y="628" class="font legend">local entry</text>
  <line x1="286" y1="624" x2="314" y2="624" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="324" y="628" class="font legend">model call</text>
  <line x1="520" y1="624" x2="548" y2="624" stroke="#ea580c" stroke-width="2.5"/>
  <text x="558" y="628" class="font legend">telemetry</text>
  <line x1="735" y1="624" x2="763" y2="624" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="773" y="628" class="font legend">evidence access</text>
  <line x1="930" y1="624" x2="958" y2="624" stroke="#16a34a" stroke-width="2.5"/>
  <text x="968" y="628" class="font legend">state write</text>

</svg>

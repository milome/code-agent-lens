<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc" data-figure-id="diagram-code-agent-lens-architecture-zh" data-visual-pattern="layered-architecture">
  <title id="title">CodeAgentLens 架构视图</title>
  <desc id="desc">代码代理请求如何通过 Gateway 变成本地可观测证据链</desc>

  <defs>
    <marker id="arrow-client" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b5a2b"/></marker>
    <marker id="arrow-gateway" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-external" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrow-telemetry" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrow-local" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-obs" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <style>
    .font { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, "Segoe UI", sans-serif; }
    .diagram-title { font-size: 30px; font-weight: 850; fill: #1c1917; text-anchor: middle; }
    .diagram-subtitle { font-size: 16px; font-weight: 500; fill: #78716c; text-anchor: middle; }
    .group-title { font-size: 18px; font-weight: 800; text-anchor: start; }
    .node-title { font-size: 16px; font-weight: 760; text-anchor: middle; }
    .node-subtitle { font-size: 13px; font-weight: 500; fill: #6b7280; text-anchor: middle; }
    .legend { font-size: 12px; font-weight: 650; fill: #6b7280; text-anchor: start; }
    .box { fill: #fafaf9; stroke-width: 2; }
    .panel { fill: #f5f5f4; stroke-width: 2; }
    .obs-panel { fill: #faf5ff; stroke-width: 2; }
    .line { stroke-width: 2.5; fill: none; stroke-linecap: square; stroke-linejoin: round; }
    .dash { stroke-dasharray: 7 5; }
  </style>
  <rect x="0" y="0" width="1100" height="720" fill="#f8f6f3"/>

  <text x="550" y="42" class="font diagram-title" text-anchor="middle">CodeAgentLens 架构视图</text>
  <text x="550" y="72" class="font diagram-subtitle" text-anchor="middle">代码代理请求如何通过 Gateway 变成本地可观测证据链</text>

  <rect x="35" y="145" width="210" height="260" rx="18" class="box" fill="#fafaf9" stroke="#8b5a2b"/>
  <text x="72" y="182" class="font group-title" text-anchor="start" fill="#8b5a2b">代码代理客户端</text>
  <rect x="75" y="210" width="130" height="52" rx="12" class="box" fill="#fafaf9" stroke="#8b5a2b"/>
  <text x="140" y="242" class="font node-title" text-anchor="middle" fill="#8b5a2b"><tspan x="140" dy="0">Claude Code</tspan></text>
  <rect x="75" y="276" width="130" height="52" rx="12" class="box" fill="#fafaf9" stroke="#8b5a2b"/>
  <text x="140" y="308" class="font node-title" text-anchor="middle" fill="#8b5a2b"><tspan x="140" dy="0">Codex CLI</tspan></text>
  <rect x="75" y="352" width="130" height="52" rx="12" class="box" fill="#fafaf9" stroke="#8b5a2b"/>
  <text x="140" y="384" class="font node-title" text-anchor="middle" fill="#8b5a2b"><tspan x="140" dy="0">其他客户端</tspan></text>

  <rect x="285" y="105" width="500" height="390" rx="18" class="panel" fill="#f5f5f4" stroke="#2563eb"/>
  <text x="307" y="142" class="font group-title" text-anchor="start" fill="#2563eb">Gateway / API :3010</text>
  <rect x="325" y="165" width="180" height="78" rx="12" class="box" fill="#fafaf9" stroke="#2563eb"/>
  <text x="415" y="197" class="font node-title" text-anchor="middle" fill="#2563eb"><tspan x="415" dy="0">HTTP 入口</tspan></text>
  <text x="415" y="220" class="font node-subtitle" text-anchor="middle">OpenAI / Anthropic</text>
  <rect x="570" y="165" width="180" height="78" rx="12" class="box" fill="#fafaf9" stroke="#2563eb"/>
  <text x="660" y="197" class="font node-title" text-anchor="middle" fill="#2563eb"><tspan x="660" dy="0">Endpoint 选择</tspan></text>
  <text x="660" y="220" class="font node-subtitle" text-anchor="middle">active endpoint</text>
  <rect x="325" y="285" width="180" height="90" rx="12" class="box" fill="#fafaf9" stroke="#2563eb"/>
  <text x="415" y="317" class="font node-title" text-anchor="middle" fill="#2563eb"><tspan x="415" dy="0">协议转换</tspan></text>
  <text x="415" y="343" class="font node-subtitle" text-anchor="middle"><tspan x="415" dy="0">Claude / Chat</tspan><tspan x="415" dy="16">Responses</tspan></text>
  <rect x="570" y="285" width="180" height="90" rx="12" class="box" fill="#fafaf9" stroke="#2563eb"/>
  <text x="660" y="317" class="font node-title" text-anchor="middle" fill="#2563eb"><tspan x="660" dy="0">代理与重试</tspan></text>
  <text x="660" y="340" class="font node-subtitle" text-anchor="middle">retry + pool</text>
  <rect x="560" y="400" width="200" height="80" rx="12" class="box" fill="#fafaf9" stroke="#047857"/>
  <text x="660" y="432" class="font node-title" text-anchor="middle" fill="#047857"><tspan x="660" dy="0">Usage + SQLite</tspan></text>
  <text x="660" y="455" class="font node-subtitle" text-anchor="middle">tokens / stats</text>

  <rect x="865" y="160" width="185" height="235" rx="18" class="box" fill="#fafaf9" stroke="#dc2626"/>
  <text x="887" y="197" class="font group-title" text-anchor="start" fill="#dc2626">模型端点</text>
  <rect x="890" y="218" width="135" height="54" rx="12" class="box" fill="#fafaf9" stroke="#dc2626"/>
  <text x="957.5" y="251" class="font node-title" text-anchor="middle" fill="#991b1b"><tspan x="957.5" dy="0">Provider A</tspan></text>
  <rect x="890" y="322" width="135" height="54" rx="12" class="box" fill="#fafaf9" stroke="#dc2626"/>
  <text x="957.5" y="355" class="font node-title" text-anchor="middle" fill="#991b1b"><tspan x="957.5" dy="0">Provider B</tspan></text>

  <rect x="235" y="535" width="730" height="120" rx="18" class="obs-panel" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="257" y="574" class="font group-title" text-anchor="start" fill="#7c3aed">本地观测运行时</text>
  <rect x="260" y="595" width="170" height="55" rx="12" class="box" fill="#fafaf9" stroke="#7c3aed"/>
  <text x="345" y="628.5" class="font node-title" text-anchor="middle" fill="#6b21a8"><tspan x="345" dy="0">请求记录器</tspan></text>
  <rect x="455" y="595" width="140" height="55" rx="12" class="box" fill="#fafaf9" stroke="#7c3aed"/>
  <text x="525" y="628.5" class="font node-title" text-anchor="middle" fill="#6b21a8"><tspan x="525" dy="0">Dump Root</tspan></text>
  <rect x="620" y="595" width="150" height="55" rx="12" class="box" fill="#fafaf9" stroke="#7c3aed"/>
  <text x="695" y="628.5" class="font node-title" text-anchor="middle" fill="#6b21a8"><tspan x="695" dy="0">Debug Portal</tspan></text>
  <rect x="795" y="595" width="160" height="55" rx="12" class="box" fill="#fafaf9" stroke="#7c3aed"/>
  <text x="875" y="628.5" class="font node-title" text-anchor="middle" fill="#6b21a8"><tspan x="875" dy="0">OpenTelemetry</tspan></text>

  <path d="M 245 276 H 260 V 204 H 325" class="line" stroke="#8b5a2b" marker-end="url(#arrow-client)"/>
  <line x1="505" y1="204" x2="570" y2="204" class="line" stroke="#2563eb" marker-end="url(#arrow-gateway)"/>
  <line x1="415" y1="243" x2="415" y2="285" class="line" stroke="#2563eb" marker-end="url(#arrow-gateway)"/>
  <line x1="660" y1="243" x2="660" y2="285" class="line" stroke="#2563eb" marker-end="url(#arrow-gateway)"/>
  <line x1="505" y1="330" x2="570" y2="330" class="line" stroke="#2563eb" marker-end="url(#arrow-gateway)"/>
  <path d="M 750 334 H 825 V 245 H 890" class="line dash" stroke="#dc2626" marker-end="url(#arrow-external)"/>
  <line x1="660" y1="375" x2="660" y2="400" class="line" stroke="#16a34a" marker-end="url(#arrow-local)"/>
  <path d="M 385 495 V 518 H 220 V 623 H 260" class="line dash" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <path d="M 695 495 V 518 H 980 V 623 H 955" class="line dash" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <line x1="430" y1="623" x2="455" y2="623" class="line" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>
  <line x1="595" y1="623" x2="620" y2="623" class="line" stroke="#7c3aed" marker-end="url(#arrow-obs)"/>

  <line x1="120" y1="691" x2="148" y2="691" stroke="#8b5a2b" stroke-width="2.5"/>
  <text x="158" y="695" class="font legend">客户端流量</text>
  <line x1="315" y1="691" x2="343" y2="691" stroke="#2563eb" stroke-width="2.5"/>
  <text x="353" y="695" class="font legend">网关处理</text>
  <line x1="505" y1="691" x2="533" y2="691" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="543" y="695" class="font legend">上游模型</text>
  <line x1="715" y1="691" x2="743" y2="691" stroke="#16a34a" stroke-width="2.5"/>
  <text x="753" y="695" class="font legend">本地状态</text>
  <line x1="870" y1="691" x2="898" y2="691" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="908" y="695" class="font legend">观测证据</text>

</svg>

services:
  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    ports:
      - "${OTEL_BIND_HOST}:${JAEGER_PORT}:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
  tempo:
    image: grafana/tempo:2.6.1
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    ports:
      - "${OTEL_BIND_HOST}:${TEMPO_PORT}:3200"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${OTEL_BIND_HOST}:${PROMETHEUS_PORT}:9090"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
  loki:
    image: grafana/loki:3.3.1
    command:
      - "-config.file=/etc/loki/loki.yaml"
    ports:
      - "${OTEL_BIND_HOST}:${LOKI_PORT}:3100"
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "${OTEL_BIND_HOST}:${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "${GF_SECURITY_ALLOW_EMBEDDING}"
      GF_AUTH_ANONYMOUS_ENABLED: "${GF_AUTH_ANONYMOUS_ENABLED}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "${GF_AUTH_ANONYMOUS_ORG_ROLE}"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus
      - loki
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command:
      - "--config=/etc/otelcol/collector.yaml"
    ports:
      - "${OTEL_BIND_HOST}:${OTEL_GRPC_PORT}:4317"
      - "${OTEL_BIND_HOST}:${OTEL_HTTP_PORT}:4318"
      - "${OTEL_BIND_HOST}:${OTEL_COLLECTOR_METRICS_PORT}:8888"
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol/collector.yaml:ro
    depends_on:
      - jaeger
      - tempo
      - prometheus
      - loki
volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  batch: {}
  transform/logs_readable_body:
    log_statements:
      - context: log
        statements:
          - set(body, attributes["event.name"]) where (body == nil or body == "") and attributes["event.name"] != nil
          - set(body, Concat([body, attributes["event.kind"]], " ")) where body != nil and body != "" and attributes["event.kind"] != nil
          - set(body, Concat([body, attributes["tool_name"]], " ")) where body != nil and body != "" and attributes["tool_name"] != nil
          - set(body, Concat([body, attributes["model"]], " ")) where body != nil and body != "" and attributes["model"] != nil
exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8888
  otlphttp/logs:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: detailed
service:
  telemetry:
    metrics:
      address: 127.0.0.1:8889
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp/jaeger
        - otlp/tempo
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - prometheus
    logs:
      receivers:
        - otlp
      processors:
        - batch
        - transform/logs_readable_body
      exporters:
        - otlphttp/logs
        - debug

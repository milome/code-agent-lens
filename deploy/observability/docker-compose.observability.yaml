services:
  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
  tempo:
    image: grafana/tempo:2.6.1
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:13000:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command:
      - "--config=/etc/otelcol/collector.local.yaml"
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8888:8888"
    volumes:
      - ./config/otel/collector.local.yaml:/etc/otelcol/collector.local.yaml:ro
    depends_on:
      - jaeger
      - tempo
      - prometheus
volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
